# =========================================================================
# LOGGING CONFIGURATION (logs.yaml)
# =========================================================================
# This file governs the telemetry, debugging output, and cost-tracking 
# generated by the LLM Connector. The settings defined here control where 
# logs are stored, how they are named, and what level of detail is recorded.
# 
# NOTE: The logging engine automatically creates a unique file for every 
# single execution session to prevent massive, unreadable monolithic logs.

# --- 1. Verbosity Level (level) ---
# Controls the minimum severity of messages that will be written to disk.
# Typical values:
#   - DEBUG: Extremely verbose. Logs full raw prompts, API responses, and HTTP chatter.
#   - INFO: Standard output. Logs token usage, exact session costs, and pipeline booting.
#   - WARNING / ERROR: Only logs connection timeouts, rate limits, or critical failures.
level: INFO

# --- 2. Message Format (format) ---
# Defines the exact text layout of every single line written to the log file.
# Uses standard Python logging variables (e.g. %(asctime)s, %(levelname)s).
format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"

# --- 3. Timestamp Format (date_format) ---
# Defines the exact structure of the timestamp injected into the log FILENAME.
# Do not use characters like "/" or ":" as they can natively break filesystem paths.
# Default "%Y-%m-%d_%H-%M-%S" outputs files like: `connector_2025-05-15_14-30-00.log`
date_format: "%Y-%m-%d_%H-%M-%S"

# --- 4. Storage Destination (log_directory) ---
# The name of the folder where all generated log files will be saved.
# This path is relative to the core `llm_connector` module root. 
# The engine will automatically create this directory on boot if it gets deleted.
log_directory: "logs"

# --- 5. Filename Prefix (filename_prefix) ---
# The static text placed at the very beginning of every auto-generated log file.
filename_prefix: "connector"
